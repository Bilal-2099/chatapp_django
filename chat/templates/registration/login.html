<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000, #071a33);
            color: white;
        }

        .card {
            width: 420px;
            background: rgba(10, 20, 40, 0.85);
            border: 1px solid rgba(0, 140, 255, 0.25);
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 140, 255, 0.15);
            padding: 30px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #cfe8ff;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        form p {
            margin: 0;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #1e3a5f;
            background: #0b0f1a;
            color: white;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #1e90ff;
            box-shadow: 0 0 10px rgba(30, 144, 255, 0.4);
        }

        button {
            margin-top: 10px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #0077ff, #00b3ff);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(0, 140, 255, 0.4);
        }

        .hint {
            text-align: center;
            font-size: 12px;
            color: #9bb4d1;
            margin-top: 10px;
        }

        a {
            color: #1e90ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Login</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
